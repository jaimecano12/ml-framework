dataset:
  path: data/raw/dataset.csv
  target_column: target
  separator: ","
  encoding: utf-8

logging:
  level: INFO        # DEBUG | INFO | WARNING | ERROR
  file: null         # set to a path to enable file sink

quality_checks:
  enabled: true
  missing_values:
    enabled: true
    threshold: 0.05          # flag columns with > 5 % missing
  duplicates:
    enabled: true
  outliers:
    enabled: true
    method: iqr              # iqr | zscore
    threshold: 3.0
  class_imbalance:
    enabled: true
    threshold: 0.1           # flag when minority class < 10 %
  constant_features:
    enabled: true
  low_variance:
    enabled: true
    threshold: 0.01

leakage_checks:
  enabled: true
  target_leakage:
    enabled: true
    correlation_threshold: 0.95
  train_test_overlap:
    enabled: true
    test_size: 0.2
    random_state: 42
  temporal_leakage:
    enabled: true
    date_column: null        # set to the name of the date/time column
  id_column_leakage:
    enabled: true
    cardinality_threshold: 0.95   # flag columns where > 95 % of values are unique
  leakage_risk_score:
    enabled: true
    threshold: 0.7                # flag features with unified risk score >= 0.7
    weights: [0.35, 0.35, 0.30]   # [correlation, mutual_information, performance_inflation]
    cv_folds: 3                   # folds for per-feature single-LR CV

impact_analysis:
  enabled: true
  models:
    - logistic_regression
    - random_forest
    - xgboost
  cv_folds: 5
  test_size: 0.2
  random_state: 42
  metrics:
    - accuracy
    - roc_auc
    - f1

feature_analysis:
  enabled: true
  feature_correlation:
    enabled: true
    correlation_threshold: 0.90   # flag pairs with |r| >= this value
  feature_relevance:
    enabled: true
    mi_threshold: 0.01            # normalised mutual information threshold
    random_state: 42
  distribution_shape:
    enabled: true
    skewness_threshold: 2.0       # |skewness| above this triggers warning
    kurtosis_threshold: 7.0       # excess kurtosis above this triggers warning

reporting:
  output_dir: reports/
  format: html               # html (pdf support added in Phase 6)
  include_plots: true

sufficiency_checks:
  enabled: true
  sample_size:
    enabled: true
    min_rows: 100
    comfortable_ratio: 50.0
  class_support:
    enabled: true
    min_samples_per_class: 30
  cv_stability:
    enabled: true
    max_cv_std: 0.10
  feature_to_sample_ratio:
    enabled: true
    max_ratio: 0.10

drift_checks:
  enabled: true
  covariate_drift:
    enabled: true
    alpha: 0.05
    date_column: null
  label_drift:
    enabled: true
    alpha: 0.05
    date_column: null

semantic_leakage:
  enabled: false              # set true when AZURE_OPENAI_API_KEY is configured
  deployment: gpt-4o-mini    # Azure OpenAI deployment name
  max_features: 30            # max features to send to LLM
  risk_threshold: medium      # flag features with risk >= this level
  # AZURE_OPENAI_API_KEY and AZURE_OPENAI_ENDPOINT must be set as env vars

scoring:
  dimension_weights:
    quality:     0.25   # contribution of quality dimension to overall score
    leakage:     0.35   # contribution of leakage dimension (highest: silent and catastrophic)
    features:    0.25   # contribution of feature analysis dimension
    sufficiency: 0.15   # contribution of sufficiency dimension
  severity_penalties:
    error:   15.0       # points deducted per failed check at error severity
    warning:  5.0       # points deducted per failed check at warning severity
    info:     0.0
  leakage_multiplier: 1.5   # leakage penalties are amplified by this factor
  grade_thresholds:
    A: 85
    B: 70
    C: 55
    D: 40

plugins: []    # list of dotted module paths to load at startup
