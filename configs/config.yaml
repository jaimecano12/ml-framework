dataset:
  path: data/raw/dataset.csv
  target_column: target
  separator: ","
  encoding: utf-8

logging:
  level: INFO        # DEBUG | INFO | WARNING | ERROR
  file: null         # set to a path to enable file sink

quality_checks:
  enabled: true
  missing_values:
    enabled: true
    threshold: 0.05          # flag columns with > 5 % missing
  duplicates:
    enabled: true
  outliers:
    enabled: true
    method: iqr              # iqr | zscore
    threshold: 3.0
  class_imbalance:
    enabled: true
    threshold: 0.1           # flag when minority class < 10 %
  constant_features:
    enabled: true
  low_variance:
    enabled: true
    threshold: 0.01

leakage_checks:
  enabled: true
  target_leakage:
    enabled: true
    correlation_threshold: 0.95
  train_test_overlap:
    enabled: true
    test_size: 0.2
    random_state: 42
  temporal_leakage:
    enabled: true
    date_column: null        # set to the name of the date/time column
  id_column_leakage:
    enabled: true
    cardinality_threshold: 0.95   # flag columns where > 95 % of values are unique

impact_analysis:
  enabled: true
  models:
    - logistic_regression
    - random_forest
    - xgboost
  cv_folds: 5
  test_size: 0.2
  random_state: 42
  metrics:
    - accuracy
    - roc_auc
    - f1

reporting:
  output_dir: reports/
  format: html               # html (pdf support added in Phase 6)
  include_plots: true
